name: Windows launcher smoke

on:
  push:
    branches: [main]
    paths:
      - 'start.bat'
      - 'start.ps1'
      - 'local-ai-proxy/**'
      - '.github/workflows/windows-launcher-smoke.yml'
  pull_request:
    paths:
      - 'start.bat'
      - 'start.ps1'
      - 'local-ai-proxy/**'
      - '.github/workflows/windows-launcher-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse start.ps1
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $scriptPath = (Resolve-Path .\start.ps1).Path
          $null = [System.Management.Automation.Language.Parser]::ParseFile($scriptPath, [ref] $tokens, [ref] $errors)
          if ($errors -and $errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: PowerShell help path
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\windows-launcher | Out-Null
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\start.ps1 --help 2>&1 | Tee-Object -FilePath artifacts\windows-launcher\start-ps1-help.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Batch wrapper help path
        shell: powershell
        run: |
          cmd.exe /c "start.bat --help --no-pause" 2>&1 | Tee-Object -FilePath artifacts\windows-launcher\start-bat-help.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Safe doctor path
        shell: powershell
        run: |
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\start.ps1 --doctor 2>&1 | Tee-Object -FilePath artifacts\windows-launcher\start-ps1-doctor.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-launcher-smoke-${{ github.run_number }}
          path: artifacts/windows-launcher/
          if-no-files-found: warn
