name: Static UI smoke

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - 'tests/**'
      - '.nvmrc'
      - '.github/workflows/static-ui-smoke.yml'
  pull_request:
    paths:
      - 'ui/**'
      - 'tests/**'
      - '.nvmrc'
      - '.github/workflows/static-ui-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enforce zero npm project files
        run: |
          if git ls-files | grep -E '(^|/)package\.json$'; then
            echo "Agent Manager stays zero npm/zero bundler; remove package.json files."
            exit 1
          fi

      - name: Acceptance smoke
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
          SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
        run: bash tests/acceptance/run.sh
