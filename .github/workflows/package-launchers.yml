name: Package launchers

on:
  push:
    branches: [main]
    paths:
      - 'start.*'
      - 'Aktualizuj.*'
      - 'update.*'
      - 'local-ai-proxy/**'
      - 'README.md'
      - 'local-ai-proxy/README.md'
      - '.github/workflows/package-launchers.yml'
  pull_request:
    paths:
      - 'start.*'
      - 'Aktualizuj.*'
      - 'local-ai-proxy/**'
      - 'README.md'
      - 'local-ai-proxy/README.md'
      - '.github/workflows/package-launchers.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare package roots
        run: |
          set -euo pipefail
          mkdir -p dist/windows/AgentManager dist/macos/AgentManager dist/linux/AgentManager
          for target in windows macos linux; do
            mkdir -p "dist/$target/AgentManager/local-ai-proxy/bin" "dist/$target/AgentManager/local-ai-proxy/models" "dist/$target/AgentManager/local-ai-proxy/logs"
            cp local-ai-proxy/proxy.js local-ai-proxy/workstation-agent.js local-ai-proxy/runtime-schedule.js local-ai-proxy/README.md local-ai-proxy/config.example.json "dist/$target/AgentManager/local-ai-proxy/"
            cp README.md "dist/$target/AgentManager/README.md"
            cat > "dist/$target/AgentManager/README-START.txt" <<'TXT'
          Agent Manager - szybki start

          1. Uruchom plik startowy dla swojego systemu.
          2. Pierwszy start zapyta o model GGUF i dane Supabase stacji.
          3. Windows sam pobierze portable Node.js, jesli nie ma go w PATH.
          4. Zostaw okno otwarte, kiedy stacja ma wykonywac polecenia AI.
          5. Diagnostyka: uruchom start z flaga --doctor.
          6. Aktualizacja: uruchom Aktualizuj. W repo git mozesz tez uzyc start z flaga --update.

          Konfiguracja stacji jest lokalna i zapisuje sie w local-ai-proxy/config.json.
          Ten plik nie powinien trafiac do gita.
          TXT
          done
          cp start.bat Aktualizuj.bat "dist/windows/AgentManager/"
          mkdir -p "dist/windows/AgentManager/launcher"
          cp launcher/start.ps1 launcher/update.ps1 "dist/windows/AgentManager/launcher/"
          cp start.sh start.command Aktualizuj.command update.sh "dist/macos/AgentManager/"
          cp start.sh Aktualizuj.command update.sh "dist/linux/AgentManager/"
          chmod +x dist/macos/AgentManager/start.sh dist/macos/AgentManager/start.command dist/macos/AgentManager/Aktualizuj.command dist/macos/AgentManager/update.sh
          chmod +x dist/linux/AgentManager/start.sh dist/linux/AgentManager/Aktualizuj.command dist/linux/AgentManager/update.sh

      - name: Zip packages
        run: |
          cd dist/windows && zip -r ../AgentManager-Windows.zip AgentManager
          cd ../macos && zip -r ../AgentManager-macOS.zip AgentManager
          cd ../linux && zip -r ../AgentManager-Linux.zip AgentManager

      - name: Upload launcher packages
        uses: actions/upload-artifact@v4
        with:
          name: agent-manager-launchers-${{ github.run_number }}
          path: |
            dist/AgentManager-Windows.zip
            dist/AgentManager-macOS.zip
            dist/AgentManager-Linux.zip
          if-no-files-found: error
